<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>비박스 — 인터랙티브 프로토타입 v2 (보완 반영)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --vimo:#e85008; --vimo-ink:#c2410c; --vimo-soft:#fef0e8; --vimo-line:#fbd9c4;
    --mybox:#f97316; --mybox-soft:#fff3ea; --mybox-line:#fed7aa;
    --text:#171717; --muted:#5f5f5f; --soft:#525252; --faint:#999;
    --page:#f5f5f5; --surf:#fafafa; --line:#ececec; --line2:#e3e3e3; --hair:#f1f1f1; --dash:#d6d6d6;
    --danger:#dc2626; --warn:#c2410c; --rev-bg:#e0f2fe; --rev-fg:#0369a1; --ok-bg:#f0fdf4; --ok-fg:#16a34a;
    --req:#fff5ee;
    --sh:0 1px 3px rgba(0,0,0,.06); --sh2:0 4px 14px rgba(0,0,0,.08); --sh3:0 20px 60px rgba(0,0,0,.28);
    --font:"Pretendard","Pretendard Variable",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);background:var(--page);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}
  h1,h2,h3,h4,p{margin:0} a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  svg.lucide{width:1em;height:1em;stroke-width:1.9;flex:none;vertical-align:-.15em}
  .mono{font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d8d8d8;border-radius:8px;border:3px solid var(--page)}::-webkit-scrollbar-thumb:hover{background:#c4c4c4}
  :focus-visible{outline:2px solid var(--vimo);outline-offset:1px;border-radius:6px}

  .app{display:grid;grid-template-columns:212px 232px 1fr;height:100vh}

  /* 사이드바 */
  .sb{background:var(--surf);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:15px 11px 0;font-size:13px;overflow-y:auto}
  .me{display:flex;align-items:center;gap:9px;padding:5px 7px}.me .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#e85008,#c8430a);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  .me .n{font-weight:700;font-size:12.5px}.me .r{font-size:10px;color:var(--faint)}.me .x{margin-left:auto;color:var(--faint);padding:4px}.me .x:hover{color:var(--text)}.me .x svg{width:15px;height:15px}
  .store{padding:8px 7px 10px;cursor:pointer;border-radius:8px}.store:hover{background:#f0f0f0}.store .l{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-bottom:5px}.store .l b{color:var(--muted);font-weight:600}
  .store .b{height:5px;border-radius:99px;background:#e7e7e7;overflow:hidden}.store .b i{display:block;height:100%;background:var(--mybox);transition:width .4s}
  .dv{height:1px;background:var(--line);margin:8px 4px}
  .lbl{font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:.05em;padding:11px 9px 4px;display:flex;align-items:center;gap:6px}.lbl svg{width:12px;height:12px}
  .nav{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;color:var(--soft);font-weight:500}.nav svg{width:16px;height:16px;color:#9a9a9a}.nav:hover{background:#f0f0f0}
  .nav.on{background:var(--page);color:var(--text);font-weight:600}.nav.on.home svg{color:var(--vimo)}
  .nav .star{margin-left:auto;color:var(--vimo)}.nav .star svg{width:13px;height:13px;fill:var(--vimo)}
  .nav .c{margin-left:auto;font-size:10.5px;color:var(--faint);font-weight:600}
  .sb-foot{margin-top:auto;border-top:1px solid var(--line);padding:13px 9px;display:flex;align-items:center;gap:9px;position:sticky;bottom:0;background:var(--surf)}
  .sb-foot .m{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;background:linear-gradient(90deg,var(--vimo) 0 50%,#f9a87a 50%)}
  .sb-foot .w{font-weight:800;font-size:14px;letter-spacing:-.01em}

  /* 컨텍스트 패널 */
  .panel{background:#fff;border-right:1px solid var(--line);padding:14px 9px;overflow-y:auto;font-size:13px}
  .panel-h{display:flex;align-items:center;gap:8px;padding:3px 8px 10px;font-weight:800;font-size:13.5px}.panel-h svg{width:16px;height:16px}.panel-h .vmk{width:16px;height:16px}
  .psec{font-size:9.5px;font-weight:700;color:var(--faint);padding:11px 8px 4px;letter-spacing:.04em;display:flex;align-items:center;gap:6px}.psec svg{width:12px;height:12px}
  .pf{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;color:#333}.pf:hover{background:var(--surf)}
  .pf svg{width:16px;height:16px;color:#a98e6a}.pf.v svg{color:#9a9a9a}.pf.b svg{color:var(--mybox)}.pf.star svg{color:var(--vimo);fill:var(--vimo)}.pf .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pf .c{font-size:10.5px;color:var(--faint)}
  .pf.cur{background:var(--page);font-weight:700}
  .pchild{display:flex;align-items:center;gap:9px;padding:6px 8px 6px 28px;border-radius:8px;color:var(--soft);font-size:12.5px}.pchild:hover{background:var(--surf)}.pchild svg{width:15px;height:15px;color:#a98e6a}.pchild.cur{background:var(--vimo-soft);color:var(--vimo-ink);font-weight:700}.pchild.cur svg{color:var(--vimo)}.pchild .c{margin-left:auto;font-size:10.5px;color:var(--faint)}.pchild.cur .c{color:var(--vimo-ink)}
  .dlrow{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer}.dlrow:hover{background:var(--surf)}.dlrow svg{width:13px;height:13px;color:var(--faint)}.dlrow .nm{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dday{font-size:11px;font-weight:700;color:var(--faint)}.dday.urgent{color:var(--warn)}

  /* 본문 */
  .main{display:flex;flex-direction:column;overflow:hidden;background:var(--page)}
  .tbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:12px;flex:none}
  .tbar .hi{font-size:16px;font-weight:800}
  .tbar .sr{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--page);border-radius:10px;padding:8px 13px;color:var(--faint);font-size:12.5px;width:230px;cursor:text}.tbar .sr svg{width:14px;height:14px}.tbar .sr .kbd{margin-left:auto}
  .kbd{font-size:10px;font-weight:700;color:var(--soft);background:#fff;border:1px solid var(--line2);border-radius:5px;padding:1px 6px}
  .icobtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--soft);position:relative}.icobtn:hover{background:var(--page)}.icobtn svg{width:17px;height:17px}.icobtn .badge{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--vimo);border:1.5px solid #fff}
  .up{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#fff;padding:8px 14px;border-radius:10px}.up svg{width:15px;height:15px}.up.v{background:var(--vimo)}.up.v:hover{background:#d4490a}.up.b{background:var(--mybox)}
  .scroll{overflow-y:auto;flex:1}
  .body{padding:18px 22px 40px;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .todohead{display:flex;align-items:center;gap:9px;margin:0 2px 13px;font-size:13.5px;font-weight:800}.todohead svg{width:16px;height:16px;color:var(--faint)}
  .wait{font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;background:#ededed;color:#57524d;cursor:pointer}.wait:hover{background:#e3e3e3}
  .ghead{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.03em;margin:2px 2px 10px;display:flex;align-items:center;gap:6px}.ghead svg{width:13px;height:13px}.ghead.pin svg{color:var(--vimo);fill:var(--vimo)}

  .vmk{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:10px;background:linear-gradient(90deg,var(--vimo) 0 50%,#f9a87a 50%);flex:none}
  .vmk.sm{width:14px;height:14px;font-size:8px;border-radius:4px}

  .st{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}.st svg{width:11px;height:11px}
  .st.fix{background:#fff7ed;color:var(--warn)} .st.rev{background:var(--rev-bg);color:var(--rev-fg)} .st.ok{background:var(--ok-bg);color:var(--ok-fg)} .st.prog{background:#f1f1f1;color:var(--soft)} .st.share{background:var(--mybox-soft);color:var(--mybox)}
  .cbadge{font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:7px}.cbadge svg{width:11px;height:11px}.cbadge.on{background:#fff7ed;color:var(--warn)}.cbadge.done{background:#eef0ef;color:var(--soft)}.cbadge .sl{font-weight:500;opacity:.6}
  .dl{font-size:11.5px;font-weight:700;color:var(--faint);display:inline-flex;align-items:center;gap:4px}.dl svg{width:12px;height:12px}.dl.due{color:var(--warn)}

  /* 썸네일 */
  .thumb{position:relative;overflow:hidden;background-position:center;background-size:cover}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .thumb .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.02) 40%,rgba(0,0,0,.45))}
  .thumb .pl{position:absolute;inset:0;display:grid;place-items:center}
  .thumb .plc{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#1a1a1a;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .15s}.thumb .plc svg{width:20px;height:20px;margin-left:2px}
  .thumb:hover .plc{transform:scale(1.08)}
  .thumb .proc{position:absolute;inset:0;display:grid;place-items:center;background:rgba(20,20,20,.4);color:#fff;font-size:10px;font-weight:700;gap:6px;flex-direction:column}.thumb .proc svg{width:18px;height:18px;animation:spin 1.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tl{position:absolute;left:9px;top:9px;display:flex;gap:5px}.tr{position:absolute;right:9px;top:9px;display:flex;gap:5px}.bl{position:absolute;left:9px;bottom:9px;display:flex;align-items:center;gap:6px}.br{position:absolute;right:9px;bottom:9px;display:flex;align-items:center;gap:6px}
  .cchip{background:rgba(10,10,10,.6);color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;backdrop-filter:blur(3px)}.cchip svg{width:11px;height:11px}
  .fchip{background:rgba(255,255,255,.92);color:var(--soft);font-size:9.5px;font-weight:700;padding:3px 6px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}.fchip svg{width:11px;height:11px}
  .dur{font-size:9.5px;font-weight:700;color:#fff;background:rgba(0,0,0,.6);padding:1px 6px;border-radius:4px;backdrop-filter:blur(3px)}
  .res{font-size:9px;font-weight:800;color:#fff;background:rgba(10,10,10,.55);padding:1px 5px;border-radius:4px}
  .verbadge{font-size:9.5px;font-weight:800;padding:1px 7px;border-radius:6px;background:var(--vimo-soft);color:#c8430a}

  .seclbl{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;margin:4px 2px 12px}.seclbl .t{color:var(--vimo-ink)}.seclbl.box .t{color:var(--text)}.seclbl .sum{font-weight:500;font-size:11px;color:var(--faint)}.seclbl .more{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--faint)}.seclbl .more:hover{color:var(--text)}.seclbl svg.hd{width:16px;height:16px;color:var(--mybox)}
  .sec{margin-bottom:22px}

  /* 히어로 */
  .hero{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--vimo-line);border-radius:16px;overflow:hidden;background:#fff;margin-bottom:20px;cursor:pointer;transition:box-shadow .15s}.hero:hover{box-shadow:var(--sh2)}
  .hero .thumb{min-height:214px}
  .hero .info{padding:16px 18px;display:flex;flex-direction:column}
  .crumb{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--faint);flex-wrap:wrap}.crumb b{color:var(--text);font-weight:700}.crumb svg.sep{width:12px;height:12px;color:#c4c4c4}
  .clink{cursor:pointer;border-radius:5px;padding:1px 5px}.clink:hover{background:var(--surf);color:var(--text)}
  .hero h3{font-size:17px;font-weight:800;margin-top:8px;display:flex;align-items:center;gap:10px}
  .catchips{display:flex;gap:11px;margin-top:9px}.catchip{font-size:10.5px;color:#737373;display:inline-flex;align-items:center;gap:4px;font-weight:600}.catchip svg{width:12px;height:12px}
  .reqbox{font-size:12px;color:#6a4a35;background:var(--req);border-radius:10px;padding:10px 12px;margin-top:11px;line-height:1.5;display:flex;gap:9px}.reqbox .ava{width:21px;height:21px;border-radius:50%;background:linear-gradient(135deg,#8a6fb0,#6d5a9c);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;flex:none}
  .hmeta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--faint);margin-top:10px;flex-wrap:wrap}.hmeta .sep{color:#d4d4d4}.hmeta svg{width:12px;height:12px}
  .act{margin-top:auto;padding-top:15px;display:flex;align-items:center;gap:9px}
  .btn{font-size:12.5px;font-weight:600;border-radius:10px;padding:9px 14px;display:inline-flex;align-items:center;gap:7px}.btn svg{width:15px;height:15px}
  .btn.pv{background:var(--vimo);color:#fff}.btn.pv:hover{background:#d4490a}.btn.pb{background:var(--mybox);color:#fff}.btn.g{background:#fff;border:1px solid var(--line2);color:var(--text)}.btn.g:hover{background:var(--surf)}
  .btn.ghost{color:var(--vimo);font-weight:600;padding:7px 10px}.btn.ghost:hover{background:var(--vimo-soft)}
  .btn.link{color:var(--faint);font-weight:600;padding:9px 4px}.btn.link:hover{color:var(--text)}

  /* 프로젝트 카드 */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:15px}
  .pcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:box-shadow .15s}.pcard:hover{box-shadow:var(--sh2)}
  .pcover{aspect-ratio:16/9}
  .pinbtn{position:absolute;right:9px;top:9px;z-index:3;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.9);color:var(--faint);opacity:0;transition:opacity .15s;backdrop-filter:blur(3px)}.pcard:hover .pinbtn{opacity:1}.pinbtn svg{width:15px;height:15px}.pinbtn.on{opacity:1;color:var(--vimo)}.pinbtn.on svg{fill:var(--vimo)}
  .ptitle{display:flex;align-items:center;gap:8px;padding:12px 15px 0;font-size:15px;font-weight:800}.ptitle .id{font-size:12px;color:var(--faint);font-weight:600}
  .pmeta{display:flex;align-items:center;gap:6px;padding:7px 15px 0;font-size:11.5px;color:var(--faint);flex-wrap:wrap}.pmeta svg{width:12px;height:12px;color:#737373}.pmeta .it{display:inline-flex;align-items:center;gap:4px}.pmeta .sep{color:#d4d4d4}.pmeta .end{margin-left:auto}
  .pfoot{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 14px;margin-top:12px;border-top:1px solid var(--hair)}
  .pcard.dim{opacity:.62}
  .pdash{background:var(--surf);border:1px dashed var(--dash);border-radius:16px;display:grid;place-items:center;min-height:188px;color:var(--faint);text-align:center}.pdash svg{width:25px;height:25px}.pdash .l{font-size:12.5px;font-weight:600;margin-top:9px}

  /* 폴더 헤더/트랙 */
  .ddhead{background:#fff;border-bottom:1px solid var(--line);padding:15px 22px;flex:none}
  .ddtop{display:flex;align-items:center;gap:11px}.ddtop .crumb{flex:1;font-size:12.5px}.ddtop .back{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--faint);padding:5px 8px;border-radius:8px}.ddtop .back:hover{background:var(--page);color:var(--text)}.ddtop .back svg{width:14px;height:14px}
  .ddmeta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--faint);margin-top:9px;flex-wrap:wrap}.ddmeta svg{width:12px;height:12px;color:#737373}.ddmeta .it{display:inline-flex;align-items:center;gap:4px}.ddmeta .sep{color:#d4d4d4}
  .track{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:13px}.track.cur{border-color:var(--vimo-line)}
  .trackhd{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800}.trackhd .gi{width:16px;height:16px;color:#737373}.trackhd.cur .gi{color:var(--vimo)}.trackhd .latest{margin-left:auto;font-size:11.5px;color:var(--faint);font-weight:600}
  .vtl{margin-top:11px}
  .vtlrow{display:flex;align-items:center;gap:13px;padding:10px 10px;border-radius:10px}.vtlrow:hover{background:var(--surf)}.vtlrow.cur{background:var(--surf)}.vtlrow.old{opacity:.6}
  .dotcol{display:flex;flex-direction:column;align-items:center;width:11px;flex:none;align-self:stretch}.dot{width:9px;height:9px;border-radius:50%;background:#d4d4d4;margin-top:6px}.dot.on{background:var(--vimo)}
  .vtlrow .thumb{width:78px;height:46px;border-radius:8px;flex:none}.vtlrow .thumb .plc{width:26px;height:26px}.vtlrow .thumb .plc svg{width:12px;height:12px}
  .vtlrow .vn{font-size:13px;font-weight:700}.vtlrow .vc{font-size:11.5px;color:var(--faint);margin-top:2px;max-width:380px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vtlrow .rt{margin-left:auto;display:flex;align-items:center;gap:9px}.vtlrow .when{font-size:11px;color:var(--faint)}
  .collap{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--soft);background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}.collap:hover{background:var(--surf)}.collap svg.g{width:16px;height:16px;color:#737373}.collap .c{font-size:11.5px;color:var(--faint);font-weight:500}.collap .ch{margin-left:auto;color:#bbb}

  /* 휴지통 */
  .trow{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:10px;background:#fff;border:1px solid var(--line);margin-bottom:8px}.trow:hover{background:var(--surf)}
  .trow .thumb{width:64px;height:40px;border-radius:7px;flex:none;opacity:.55}.trow .nm{font-size:13px;font-weight:600}.trow .pa{font-size:11px;color:var(--faint);margin-top:2px}.trow .rt{margin-left:auto;display:flex;align-items:center;gap:10px}
  .keepbadge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:#ededed;color:#57524d}

  /* 온보딩 */
  .dropzone{border:2px dashed var(--line2);border-radius:16px;padding:42px;text-align:center;color:var(--faint);background:#fff}.dropzone.over{border-color:var(--vimo);background:#fbf6f1}.dropzone .ic{width:46px;height:46px;border-radius:14px;background:var(--vimo-soft);display:grid;place-items:center;margin:0 auto 12px}.dropzone .ic svg{width:24px;height:24px;color:var(--vimo)}.dropzone .t1{font-size:14px;font-weight:700;color:var(--text)}.dropzone .t2{font-size:12px;margin:5px 0 14px}
  .owrap{max-width:620px;margin:10px auto}.owrap h2{font-size:20px;font-weight:800;text-align:center}.owrap .sub{font-size:13px;color:var(--muted);text-align:center;margin-top:8px}
  .ostep{display:flex;gap:12px;justify-content:center;margin:24px 0}.ostepcard{flex:1;max-width:180px;border:1px solid var(--line2);border-radius:12px;padding:16px;text-align:center;background:#fff}.ostepcard .num{width:20px;height:20px;border-radius:50%;background:var(--page);color:var(--soft);font-size:10px;font-weight:800;display:grid;place-items:center;margin:0 auto 9px}.ostepcard svg{width:19px;height:19px;color:var(--soft)}.ostepcard .l{font-size:12px;font-weight:700;margin-top:8px}

  return `<div class="thumb ${grad} ${o.cls||''}">
    <img src="${IMG(seed)}" onerror="this.style.display='none'" alt="">

    ${o.tl?`<div class="tl">${o.tl}</div>`:''}
    ${o.tr?`<div class="tr">${o.tr}</div>`:''}

}

  const cmtsHTML = visible.map((c)=>{ const idx=COMMENTS.indexOf(c);
    const resolveBtn = c.own?'':`<button class="cresolve ${c.resolved?'done':''}" onclick="toggleResolve(${idx})"><svg data-lucide="${c.resolved?'check-circle-2':'circle'}"></svg>${c.resolved?'해결됨':'해결'}</button>`;
    return `<div class="cmt ${c.resolved?'done':''}"><span class="ava" style="background:linear-gradient(135deg,${c.c},#3d3d5c)">${c.av}</span><div class="bd"><div class="nm">${c.who}<span>${c.when}</span>${resolveBtn}</div><div class="tx">${c.tcs.map(t=>`<span class="tcchip" onclick="toast('${t} 지점으로 이동')"><svg data-lucide="play"></svg>${t}</span>`).join('')}${c.tx}</div></div></div>`;
  }).join('');
  document.getElementById('modal').innerHTML = `
    <div class="player">
      <div class="stage2"><button class="mclose" onclick="closeModal()"><svg data-lucide="x"></svg></button>
        <img src="${IMG(v.thumb+'-'+ver.v)}" onerror="this.style.display='none'" alt="">
        <div class="bigpl"><button onclick="toast('재생 (데모)')"><svg data-lucide="play"></svg></button></div>
      </div>
      <div class="ctrl">
        <div class="seek"><i></i><span class="mk" style="left:24%" title="0:42" onclick="toast('0:42로 이동')"></span><span class="mk" style="left:62%" title="1:15" onclick="toast('1:15로 이동')"></span></div>
        <div class="ctrlrow"><button onclick="toast('재생 (데모)')"><svg data-lucide="play"></svg></button><button title="이전 프레임"><svg data-lucide="chevron-left"></svg></button><button title="다음 프레임"><svg data-lucide="chevron-right"></svg></button><span class="t">0:42 / ${ver.dur}</span><button class="sp"><svg data-lucide="volume-2"></svg></button><button><svg data-lucide="settings"></svg></button><button><svg data-lucide="maximize"></svg></button></div>
      </div>
    </div>
    <div class="side">
      <div class="sh">
        <div class="crumb"><span class="vmk sm">V</span> <span class="clink" onclick="closeModal();go('folder','${k}')">${p.name} <span class="mono">${p.id}</span></span> <svg data-lucide="chevron-right" class="sep"></svg> ${v.name}</div>
        <h4>${v.name} · ${ver.v} ${statusChip(v.status,v.statusLabel)} ${cmtBadge(v.cmt.open,v.cmt.total)}</h4>
        <div class="subline"><span class="sub">${ver.dur} · ${ver.size} · 업로드 ${ver.when}</span><span class="cfilter ${cmtFilter?'on':''}" onclick="toggleCmtFilter('${k}',${vi},${ri})">미해결만</span></div>
      </div>
      <div class="cmts">${cmtsHTML || '<div class="palempty"><svg data-lucide="check-circle-2"></svg>모든 코멘트를 해결했어요</div>'}</div>
      <div class="cmtbox"><div class="ip">코멘트 남기기…</div><button class="send" onclick="toast('코멘트 전송 (데모)')"><svg data-lucide="send"></svg></button></div>
    </div>`;
  modalCtx={k,vi,ri};
  document.getElementById('ov').classList.add('show');
  if(window.lucide) lucide.createIcons();
}
let modalCtx=null;
function closeModal(){ document.getElementById('ov').classList.remove('show'); }
function toggleResolve(i){ COMMENTS[i].resolved=!COMMENTS[i].resolved;
  // 미해결 카운트 갱신: 브랜드필름(sujeong v0) 기준
  const open=COMMENTS.filter(c=>!c.own&&!c.resolved).length;
  PROJECTS.sujeong.videos[0].cmt.open=open;
  if(modalCtx) openModal(modalCtx.k,modalCtx.vi,modalCtx.ri);
  toast(COMMENTS[i].resolved?'코멘트 해결 처리':'해결 취소');
}
function toggleCmtFilter(k,vi,ri){ cmtFilter=!cmtFilter; openModal(k,vi,ri); }

/* ---- 알림 ---- */
function notifHTML(){
  const unread=NOTIFS.filter(n=>n.unread).length;
  return `<div class="nhd">알림 ${unread?`<span style="color:var(--vimo)">${unread}</span>`:''}<button class="read" onclick="markAllRead()">모두 읽음</button></div>
  <div class="nlist">${NOTIFS.map((n,i)=>`<div class="nrow ${n.unread?'unread':''}" onclick="hitNotif(${i})"><span class="ni ${n.ic}"><svg data-lucide="${SIC[n.ic]||'message-square'}"></svg></span><div><div class="nt">${n.t}</div><div class="nd">${n.d}</div><div class="nw">${n.w}</div></div></div>`).join('')}</div>
  <div class="nfoot">지난 알림 모두 보기</div>`;
}
function toggleNotif(e){ e&&e.stopPropagation(); const p=document.getElementById('notifPanel'); if(p.classList.contains('show')){closeNotif();return;} p.innerHTML=notifHTML(); p.classList.add('show'); if(window.lucide)lucide.createIcons(); }
function closeNotif(){ document.getElementById('notifPanel').classList.remove('show'); }
function markAllRead(){ NOTIFS.forEach(n=>n.unread=false); document.getElementById('bellDot').style.display='none'; toggleNotif(); toggleNotif(); closeNotif(); toast('모든 알림을 읽음 처리'); }
function hitNotif(i){ NOTIFS[i].unread=false; if(!NOTIFS.some(n=>n.unread))document.getElementById('bellDot').style.display='none'; closeNotif(); NOTIFS[i].act(); }
document.addEventListener('mousedown',e=>{ const p=document.getElementById('notifPanel'); if(p.classList.contains('show')&&!p.contains(e.target)&&e.target.closest('#bell')===null) closeNotif(); });

/* ---- 검색 팔레트 ---- */
let palSel=0, palItems=[];
function openPalette(){ document.getElementById('palOv').classList.add('show'); renderPal(''); setTimeout(()=>{const i=document.getElementById('palInput'); i&&i.focus();},30); }
function closePalette(){ document.getElementById('palOv').classList.remove('show'); }
function renderPal(q){
  q=(q||'').trim();
  if(!q){ palItems=SEARCH_IDX.slice(0,4);
    document.getElementById('pal').innerHTML = palInputHTML(q) + `<div class="palres">
      <div class="palsec">최근 검색</div>${RECENT_Q.map(r=>`<div class="presult" onclick="document.getElementById('palInput').value='${r}';renderPal('${r}')"><span class="pi"><svg data-lucide="history"></svg></span><div><div class="pt">${r}</div></div></div>`).join('')}
      <div class="palsec">추천</div>${palItems.map((it,i)=>presultHTML(it,i)).join('')}</div>`;
  } else {
    palItems=SEARCH_IDX.filter(it=>(it.t+it.sub+it.type).toLowerCase().includes(q.toLowerCase()));
    const body = palItems.length ? `<div class="palres">${palItems.map((it,i)=>presultHTML(it,i)).join('')}</div>` : `<div class="palempty"><svg data-lucide="search-x"></svg>'${q}' 검색 결과가 없어요</div>`;
    document.getElementById('pal').innerHTML = palInputHTML(q) + body;
  }
  palSel=0; updateSel();
  if(window.lucide) lucide.createIcons();
}
function palInputHTML(q){ return `<div class="palin"><svg data-lucide="search"></svg><input id="palInput" placeholder="프로젝트·영상·코멘트 검색" value="${q.replace(/"/g,'&quot;')}" oninput="renderPal(this.value)" onkeydown="palKey(event)"><span class="kbd">esc</span></div>`; }
function presultHTML(it,i){ return `<div class="presult" data-i="${i}" onclick="hitPal(${i})"><span class="pi"><svg data-lucide="${it.ic}"></svg></span><div><div class="pt">${it.t}</div><div class="ps">${it.sub}</div></div><span class="tag">${it.type}</span></div>`; }
function updateSel(){ document.querySelectorAll('#pal .presult[data-i]').forEach(e=>e.classList.toggle('sel', +e.dataset.i===palSel)); }
function hitPal(i){ const it=palItems[i]; closePalette(); if(it) it.act(); }
function palKey(e){ if(e.key==='ArrowDown'){e.preventDefault();palSel=Math.min(palSel+1,palItems.length-1);updateSel();} else if(e.key==='ArrowUp'){e.preventDefault();palSel=Math.max(palSel-1,0);updateSel();} else if(e.key==='Enter'){e.preventDefault();hitPal(palSel);} }
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openPalette();} if(e.key==='Escape'){closePalette();closeModal();closeNotif();} });

/* ---- 업로드 도크 ---- */
let upTimer=null;
function demoUpload(mode){
  const dock=document.getElementById('upDock');
  dock.classList.add('show');
  const fail = mode==='fail';
  dock.innerHTML = `<div class="udhd"><svg data-lucide="upload"></svg> 업로드 1건<button class="x" onclick="document.getElementById('upDock').classList.remove('show')"><svg data-lucide="x"></svg></button></div>
    <div class="uprow"><div class="l"><svg data-lucide="film" style="width:15px;height:15px;color:#737373"></svg><span class="nm">브랜드필름_최종_v4.mp4</span><span class="pct" id="upPct">0%</span></div>
      <div class="upbar"><i id="upBar" style="width:0%"></i></div>
      <div class="upsub" id="upSub"><svg data-lucide="loader"></svg><span>284MB / 1.2GB · 잠시만요…</span></div></div>`;
  if(window.lucide) lucide.createIcons();
  clearInterval(upTimer);
  let pct=0;
  upTimer=setInterval(()=>{
    pct+=Math.round(6+Math.random()*9);
    if(fail && pct>=58){ clearInterval(upTimer);
      document.getElementById('upBar').parentElement.classList.add('danger');
      document.getElementById('upBar').style.width='58%';
      document.getElementById('upPct').textContent='멈춤';
      document.getElementById('upSub').className='upsub err';
      document.getElementById('upSub').innerHTML=`<svg data-lucide="wifi-off"></svg><span>네트워크가 끊겨 멈췄어요</span><span class="retry" onclick="demoUpload('ok')">다시 시도</span>`;
      if(window.lucide)lucide.createIcons(); return; }
    if(pct>=100){ pct=100; clearInterval(upTimer);
      document.getElementById('upBar').style.width='100%';
      document.getElementById('upPct').textContent='완료';
      document.getElementById('upSub').innerHTML=`<svg data-lucide="check-circle-2" style="color:var(--ok-fg)"></svg><span>업로드 완료 · 검수 대기로 전환</span>`;
      if(window.lucide)lucide.createIcons();
      toast('새 버전 업로드 완료');
      setTimeout(()=>document.getElementById('upDock').classList.remove('show'),3200); return; }
    document.getElementById('upBar').style.width=pct+'%';
    document.getElementById('upPct').textContent=pct+'%';
    document.getElementById('upSub').querySelector('span').textContent=`${Math.round(pct*12.8)}MB / 1.2GB · ${Math.max(1,Math.round((100-pct)/12))}초 남음`;
  },420);
}

/* ---- 빈 상태 토글 ---- */
function toggleEmpty(){ hasWork=!hasWork; if(view!=='home') view='home'; render(); toast(hasWork?'정상 상태':'빈 상태(신규 파트너) 미리보기'); }

/* ---- 토스트 ---- */
let tt;
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastmsg').textContent=msg; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---- 초기 라우팅 ---- */
const _h=location.hash;
if(_h.startsWith('#folder')){ go('folder',(_h.split(':')[1])||'sujeong'); }
else if(_h==='#trash'){ go('trash'); }
else if(_h==='#empty'){ hasWork=false; render(); }
else { render(); }
if(_h.startsWith('#modal')){ const k=(_h.split(':')[1])||'sujeong'; go('folder',k); openModal(k,0,0); }
if(_h==='#notif'){ toggleNotif(); }
if(_h==='#search'){ openPalette(); }
if(_h==='#upload'){ demoUpload('fail'); }
</script>
</body>
</html>
