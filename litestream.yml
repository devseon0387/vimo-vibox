# Vibox SQLite 백업 — 맥미니 운영
# 2026-05-02 이전: iMac → 맥미니 (litestream 0.3 → 0.5 업그레이드와 함께)
# 새 replica 경로 사용 (구버전 데이터 보존)

dbs:
  - path: /Users/vimo_server/vibox/_data/vibox.db
    replica:
      url: file:///Users/vimo_server/vibox-vault/litestream-macmini
      retention: 720h           # 30일 보관
      sync-interval: 1s
      snapshot-interval: 24h
